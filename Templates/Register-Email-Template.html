<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration</title>
</head>
<body style="margin: 0; padding: 0; background-color: #323232;">
    <!-- Main background table -->
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #323232;">
        <tr>
            <td align="center" style="padding: 20px 0;">
                <!-- Content container table -->
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #323232; border: 1px solid #222222; width: 600px; max-width: 600px;">
                    <tr>
                        <td style="padding: 40px; color: #ffffff; font-family: Arial, sans-serif; font-size: 16px; line-height: 24px;">
                            <p style="margin-top: 0;">Hi @@USERNAME@@,</p>
                            
                            <p>Someone (hopefully you) signed up for an Entropy account at <a href="@@PUBLICURI@@" style="color: #ffffff; text-decoration: underline;">@@PUBLICURI@@</a></p>
                            
                            <p>If this was you, please click the link below to create a password and activate your account:</p>
                            
                            <p style="word-break: break-all;">
                                <a href="@@REGISTERURI@@" style="color: #00aaff; text-decoration: underline;">@@REGISTERURI@@</a>
                            </p>
                            
                            <p style="margin-bottom: 0;">Kind Regards,<br>
                            @@SERVERNAME@@</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
