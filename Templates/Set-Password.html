<!DOCTYPE html>
<html dir="ltr" lang="en_us">
    <title>Harmony | Set Password</title>
    <head>
        <style>
            body {
                background-color: #323232;
                color: #f0f0f0;
                font-size: 1.1em;
                font-family: Roboto,-apple-system,Helvetica Neue,Helvetica,Arial,sans-serif;
            }

            #SetPassword {
                width: 450px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            #SetPassword h2 {
                margin: 10px 0 0 0;
                padding: 0;
                line-height: 1.2;
                font-size: 2em;
                letter-spacing: 2px;
                font-weight: 100;
            }

            #SetPassword form {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            #SetPassword form input[type="password"] {
                padding: 10px;
                border-radius: 5px;
                resize: none;
                outline: none;
                background-color: #0006;
                color: #fff;
                align-content: center;
                font-size: .8em;
                border: none;
            }

            #SetPassword form input[type="submit"] {
                font-size: 14px;
                line-height: 1.715em;
                font-weight: 500;
                text-transform: uppercase;
                display: inline-flex;
                flex-direction: column;
                align-items: stretch;
                position: relative;
                border: 0;
                text-align: center;
                width: auto;
                height: auto;
                padding: 10px;
                min-width: 0px;
                min-height: 0px;
                outline: 0 !important;
                background: #000 !important;
                color: #fff !important;
                border-radius: 3px;
            }

            #SetPassword form input[type="submit"]:hover {
                cursor: pointer;
            }

            #SetPassword #Error {
                padding: 10px;
                border-style: solid;
                border-width: 1px;
                border-color: rgba(255, 0, 0, 0.5);
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <div id="SetPassword">
            <h2>Set Password</h2>

            <form method="post" action="@@POSTBACKURI@@">
                <input type="password" placeholder="Password" name="Password" />
                <input type="password" placeholder="Confirm Password" name="ConfirmPassword" />

                @@ERRORSTATE@@

                <input type="submit" value="Submit" />
            </form>
        </div>
    </body>
</html>
